<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>食指指令接收處</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: "Noto Serif TC", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .index-container {
            border: 2px solid #333;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
            width: 80%;
            max-width: 600px;
            position: relative;
        }

        .prescript-box {
            min-height: 120px;
            margin: 30px 0;
            padding: 20px;
            border-top: 1px solid #444;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prescript-text {
            font-size: 1.6rem;
            line-height: 1.6;
            letter-spacing: 2px;
            color: #fff;
            animation: stampAppear 0.3s ease-out forwards;
            margin: 0;
        }

        /* 重點：讓填入的詞彙顏色稍微不同，更有格式感 */
        .highlight {
            color: #d4af37; /* 金色 */
            font-weight: bold;
            padding: 0 5px;
        }

        .seal-button {
            background: transparent;
            color: #8b0000;
            border: 2px solid #8b0000;
            padding: 12px 40px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            letter-spacing: 5px;
        }

        .seal-button:hover {
            background: #8b0000;
            color: white;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
        }

        @keyframes stampAppear {
            0% { transform: scale(1.5); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        .highlight {
    color: #d4af37;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    background: rgba(139, 0, 0, 0.1);
    padding: 2px 4px;
    border-radius: 2px;
}

/* 讓文字出現時帶有一點點模糊抖動 */
@keyframes stampAppear {
    0% { transform: scale(1.1); opacity: 0; filter: blur(15px) contrast(2); }
    50% { transform: scale(0.98); opacity: 0.8; filter: blur(2px); }
    100% { transform: scale(1); opacity: 1; filter: blur(0); }
}
    </style>
</head>
<body>

<div class="index-container">
    <h2 style="letter-spacing: 10px; color: #666;">THE INDEX</h2>
    <div id="prescript-box" class="prescript-box">
        <p style="color: #444;">-- 等待指令中 --</p>
    </div>
    <button onclick="generatePrescript()" class="seal-button">領受意志</button>
</div>

<script>
    const data = {
    times: ["在空無一物的時刻", "當第十三聲蟬鳴響起時", "在血液凝固的溫度下", "當影子長過本體之時", "在被遺忘的夢境邊緣", "於尚未命名的色彩中"],
    verbs: ["編織", "抹除", "親吻", "拆解", "凝視", "咀嚼", "雕刻", "縫補"],
    senses: ["未曾存在的", "正在腐爛的", "不可直視的", "被奪走名字的", "散發鐵鏽味的", "透明的"],
    names: ["虛無", "螺旋", "線條的末端", "昨日的餘溫", "所有人的沈默", "齒輪的喘息", "褪色的誓言"],
    abstract_prefix: ["為了證明服從，你必須", "以都市之名，准許你", "在苦難的盡頭，請務必", "這是不容置疑的意志："],
    requirements: ["保持呼吸的韻律與時鐘同步", "將眼球轉向不存在的方位", "用指尖感受重力的重量", "在心中默唸不存在的數字"]
};

function getRandom(array) {
    return array[Math.floor(Math.random() * array.length)];
}

function generatePrescript() {
    const box = document.getElementById('prescript-box');
    
    // 隨機決定指令結構
    const structureType = Math.random();
    let fullHTML = '';

    if (structureType > 0.5) {
        // 結構 A：經典分格式 (時間 + 動作 + 感官 + 對象)
        fullHTML = `
            <p class="prescript-text">
                <span class="highlight">${getRandom(data.times)}</span>，
                <span class="highlight">${getRandom(data.verbs)}</span>你
                <span class="highlight">${getRandom(data.senses)}</span>的
                <span class="highlight">${getRandom(data.names)}</span>。
            </p>
        `;
    } else {
        // 結構 B：抽象要求式 (前綴 + 具體要求的抽象化)
        fullHTML = `
            <p class="prescript-text">
                <span class="highlight">${getRandom(data.abstract_prefix)}</span>
                <span class="highlight">${getRandom(data.requirements)}</span>，並
                <span class="highlight">${getRandom(data.verbs)}</span>
                <span class="highlight">${getRandom(data.names)}</span>。
            </p>
        `;
    }

    box.innerHTML = fullHTML;
    
    // 視覺回饋：背景隨機閃爍紅光
    triggerEmergencyEffect();
}

function triggerEmergencyEffect() {
    const container = document.querySelector('.index-container');
    container.style.borderColor = '#8b0000';
    setTimeout(() => {
        container.style.borderColor = '#333';
    }, 100);
}
</script>

</body>
</html>
